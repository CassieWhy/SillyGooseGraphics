		<style>
			@keyframes contactBannerSlide {
				0% {
					transform: translateX(0);
				}
				100% {
					transform: translateX(-50%);
				}
			}

			#banner {
				position: relative;
				overflow: hidden;
			}

			#banner .inner {
				position: relative;
				z-index: 2;
			}

			.contact-banner-bg {
				position: absolute;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				overflow: hidden;
				z-index: 1;
				opacity: 0.45;
				pointer-events: none;
			}

			.contact-banner-track {
				position: absolute;
				inset: 0 auto 0 0;
				display: flex;
				width: max-content;
				height: 100%;
				animation: contactBannerSlide 28s linear infinite;
			}

			.contact-banner-track img {
				width: 26vw;
				min-width: 220px;
				height: 100%;
				object-fit: cover;
				flex: 0 0 auto;
			}

			#banner .inner > .major,
			#banner .inner > .content {
				position: relative;
				z-index: 3;
			}

			/* Mobile optimizations */
			@media screen and (max-width: 980px) {
				/* Reduce header logo padding on tablets */
				#header .logo strong {
					padding: 0 15px !important;
				}
			}
			
			@media screen and (max-width: 736px) {
				/* Reorganize header for mobile */
				#header {
					display: flex !important;
					flex-direction: column !important;
					align-items: flex-start !important;
					padding: 0.75em 1em !important;
					background-color: #000000 !important;
				}
				
				/* Line break in welcome text on mobile only */
				.welcome-line {
					display: block !important;
				}
				
				/* Left align banner text on mobile */
				#banner .content {
					text-align: left !important;
				}
				
				#header .logo {
					width: 100% !important;
					margin-bottom: 0.25em !important;
					text-align: center !important;
				}
				
				#header .logo strong {
					padding: 0 !important;
					font-size: 1.3em !important;
					display: block !important;
				}
				
				/* Hide "by Cassie Fennell" on mobile */
				#header .logo span {
					display: none !important;
				}
				
				/* Navigation below logo */
				#header nav {
					width: 100% !important;
					display: flex !important;
					justify-content: space-between !important;
					align-items: center !important;
					background-color: rgba(0, 0, 0, 0.95) !important;
					padding: 0.5em 1em !important;
					border-radius: 4px !important;
				}
				
				#header nav a[href="#contact"] {
					margin-right: 0 !important;
					font-size: 0.85em !important;
				}
				
				#header nav a[href="#menu"] {
					font-size: 0.85em !important;
				}
				
				/* Ensure images don't overflow */
				.image img {
					max-width: 100%;
					height: auto;
				}
			}
			
			@media screen and (max-width: 480px) {
				/* Even more compact on very small screens */
				#header {
					padding: 0.5em 0.75em !important;
				}
				
				#header .logo strong {
					font-size: 0.95em !important;
				}
				
				#header nav a[href="#contact"],
				#header nav a[href="#menu"] {
					font-size: 0.75em !important;
				}
			}
			
			@media screen and (max-width: 360px) {
				/* Extra small screens */
				#header .logo strong {
					font-size: 0.85em !important;
				}
				
				#header nav a[href="#contact"],
				#header nav a[href="#menu"] {
					font-size: 0.7em !important;
				}
			}

			/* === Mobile nav: HOME | CONTACT ME | MENU === */
			@media screen and (max-width: 736px) {
				#header {
					display: flex !important;
					flex-direction: column !important;
					align-items: flex-start !important;
					padding: 0.75em 1em !important;
					background-color: #000000 !important;
				}
				#header > div,
				#header .logo { display: none !important; }
				#header nav {
					width: 100% !important;
					display: flex !important;
					justify-content: center !important;
					align-items: center !important;
					background-color: rgba(0, 0, 0, 0.95) !important;
					padding: 0.35em 0 !important;
					padding-left: 0 !important;
					padding-right: 0 !important;
					border-radius: 4px !important;
					position: relative;
					min-height: 44px;
				}
				#header nav .mobile-home-nav {
					display: inline-flex !important;
					position: absolute !important;
					left: 20px !important;
					right: auto !important;
					top: 50% !important;
					transform: translateY(-50%) !important;
					margin: 0 !important;
					padding-left: 0 !important;
					padding-right: 0 !important;
				}
				#header nav a {
					display: inline-flex !important;
					align-items: center !important;
					justify-content: center !important;
					min-height: 44px;
					padding: 0 0.65em !important;
					line-height: 1 !important;
					font-size: calc(0.95em + 5px) !important;
					text-align: center;
				}
				#header nav a[href="#contact"] {
					display: inline-flex !important;
					position: absolute !important;
					left: 50% !important;
					top: 50% !important;
					transform: translate(-50%, -50%) !important;
					margin-right: 0 !important;
				}
				#header nav a[href="#menu"] {
					position: absolute !important;
					left: auto !important;
					right: 30px !important;
					top: 50% !important;
					transform: translateY(-50%) !important;
					margin: 0 !important;
					padding-right: 0 !important;
					padding-left: 0 !important;
				}
				#header nav a[href="#menu"]:last-child {
					padding-right: 0 !important;
					padding-left: 0 !important;
				}
				#header nav a[href="#menu"]:before,
				#header nav a[href="#menu"]:after {
					display: none !important;
					content: none !important;
				}
			}
			@media screen and (max-width: 480px) {
				#header nav a[href="#contact"],
				#header nav a[href="#menu"],
				#header nav .mobile-home-nav {
					font-size: 0.88em !important;
				}
			}
			@media screen and (max-width: 360px) {
				#header nav a[href="#contact"],
				#header nav a[href="#menu"],
				#header nav .mobile-home-nav {
					font-size: 0.78em !important;
					padding: 0 0.5em !important;
				}
			}
		</style>

	<body class="is-preload">

		<!-- Wrapper -->
			<div id="wrapper">

				<!-- Header -->
				<header id="header" style="display: flex; align-items: center; justify-content: space-between;">
					<div style="flex: 1;"></div>
					<a href="home.html" class="logo" style="flex: 0 0 auto; text-align: center; margin: 7px auto 0 auto;"><strong style="padding: 0 40px; font-size: 1.5em; letter-spacing: 5px;">Silly Goose Graphics</strong></a>
					<nav style="flex: 1; display: flex; justify-content: flex-end;">
						<a href="home.html" class="mobile-home-nav" style="display: none;">HOME</a>

							<li><a href="home.html">Home</a></li>

							<li><a href="design.html">DESIGN</a></li>

							<li><a href="3D_Creations.html">3D CREATIONS</a></li>
														<li><a href="contact.html">Contact Me</a></li>
						</ul>
						<ul class="actions stacked">
							<li><a href="#" class="button primary fit">Get Started</a></li>
						</ul>
					</nav>

				<!-- Banner -->
					<section id="banner" class="major">
						<div class="contact-banner-bg" aria-hidden="true">
							<div class="contact-banner-track">
								<img src="images/CassiePics/CassieFennell.jpg" alt="" />
								<img src="images/CassiePics/CampSelfie.jpg" alt="" />
								<img src="images/CassiePics/Heart.jpeg" alt="" />
								<img src="images/CassiePics/CassieFennell.jpg" alt="" />
								<img src="images/CassiePics/CampSelfie.jpg" alt="" />
								<img src="images/CassiePics/Heart.jpeg" alt="" />
							</div>
						</div>
						<div class="inner">
							<header class="major" style="text-align: center;">
								<h1>Get In Touch</h1>
							<p>I'd love to hear from you!</p>
						</header>
						</div>
					</section>

				<!-- Main -->
					<div id="main">

						<!-- Contact Form -->
							<section id="contact">
								<div class="inner">
									<header class="major">
										<h2>Send me a Message</h2>
									</header>
									<form method="post" action="https://formspree.io/f/xojnlkqg">
										<div class="fields">
											<div class="field">
												<label for="name">Name</label>
												<input type="text" name="name" id="name" placeholder="Your Name" required />
											</div>
											<div class="field">
												<label for="reason">Reason for Contact</label>
												<input type="text" name="reason" id="reason" placeholder="e.g., Project Inquiry, Partnership, etc." required />
											</div>
											<div class="field">
												<label for="message">Message</label>
												<textarea name="message" id="message" rows="8" placeholder="Please provide details about your inquiry..." required></textarea>
											</div>
										</div>
										<ul class="actions">
										<li><input type="submit" value="Send Message" class="primary" style="background-color: #000000 !important; color: #00FF00 !important;" /></li>
											<li><input type="reset" value="Clear" /></li>
										</ul>
									</form>
								</div>
							</section>

						<!-- Contact Info -->
							<section id="contact-info">
								<div class="inner">
									<section class="split">
										<section>
											<div class="contact-method">
												<span class="icon solid alt fa-envelope"></span>
												<h3>Email</h3>
												<a href="mailto:cassie@sillygoosegraphics.ca">cassie@sillygoosegraphics.ca</a>
											</div>
										</section>
										<section>
											<div class="contact-method">
												<span class="icon solid alt fa-phone"></span>
												<h3>Phone</h3>
												<span>(000) 000-0000</span>
											</div>
										</section>
									</section>
								</div>
							</section>
